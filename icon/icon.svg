<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8e60"/>
      <stop offset="1" stop-color="#ff5c62"/>
    </linearGradient>
    <radialGradient id="tomato" cx="0.39" cy="0.36" r="0.78">
      <stop offset="0" stop-color="#ff7868"/>
      <stop offset="1" stop-color="#c1261e"/>
    </radialGradient>
    <radialGradient id="spec" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe6dc" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffe6dc" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round"><rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/></clipPath>
  </defs>

  <!-- 圆角背景 -->
  <g clip-path="url(#round)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <!-- 番茄投影 -->
    <ellipse cx="512" cy="648" rx="300" ry="300" fill="#78140f" opacity="0.28"/>
  </g>

  <!-- 叶子（5 瓣）+ 茎 -->
  <g transform="translate(512,336)">
    <g fill="#2c7a30">
      <path d="M0,0 L18,-46 L0,-150 L-18,-46 Z" transform="rotate(72)"/>
      <path d="M0,0 L18,-46 L0,-150 L-18,-46 Z" transform="rotate(216)"/>
    </g>
    <g fill="#60c456">
      <path d="M0,0 L18,-46 L0,-150 L-18,-46 Z" transform="rotate(0)"/>
      <path d="M0,0 L18,-46 L0,-150 L-18,-46 Z" transform="rotate(144)"/>
      <path d="M0,0 L18,-46 L0,-150 L-18,-46 Z" transform="rotate(288)"/>
    </g>
    <line x1="0" y1="0" x2="-6" y2="-70" stroke="#5a982e" stroke-width="22" stroke-linecap="round"/>
  </g>

  <!-- 番茄主体 -->
  <circle cx="512" cy="600" r="300" fill="url(#tomato)"/>
  <ellipse cx="452" cy="470" rx="90" ry="70" fill="url(#spec)"/>

  <!-- 表盘 -->
  <circle cx="512" cy="600" r="160" fill="#961c16"/>
  <circle cx="512" cy="600" r="150" fill="#fff5e9"/>

  <!-- Apple 彩虹环（表盘外侧，6 段）-->
  <g fill="none" stroke-width="22" transform="translate(512,600)">
    <g stroke-linecap="butt">
      <!-- 每段 60°，留 3° 间隙；半径 180 -->
      <path d="M0,-180 A180,180 0 0,1 155.9,-90"   stroke="#61bb46"/>
      <path d="M155.9,-90 A180,180 0 0,1 155.9,90"  stroke="#fdb827"/>
      <path d="M155.9,90 A180,180 0 0,1 0,180"      stroke="#f5821f"/>
      <path d="M0,180 A180,180 0 0,1 -155.9,90"     stroke="#e03a3e"/>
      <path d="M-155.9,90 A180,180 0 0,1 -155.9,-90" stroke="#963d97"/>
      <path d="M-155.9,-90 A180,180 0 0,1 0,-180"    stroke="#009ddc"/>
    </g>
  </g>

  <!-- 刻度 -->
  <g stroke="#b0362c" transform="translate(512,600)">
    <g stroke-width="9">
      <line y1="-144" y2="-124"/>
      <line y1="-144" y2="-124" transform="rotate(90)"/>
      <line y1="-144" y2="-124" transform="rotate(180)"/>
      <line y1="-144" y2="-124" transform="rotate(270)"/>
    </g>
    <g stroke-width="5">
      <line y1="-144" y2="-130" transform="rotate(30)"/>
      <line y1="-144" y2="-130" transform="rotate(60)"/>
      <line y1="-144" y2="-130" transform="rotate(120)"/>
      <line y1="-144" y2="-130" transform="rotate(150)"/>
      <line y1="-144" y2="-130" transform="rotate(210)"/>
      <line y1="-144" y2="-130" transform="rotate(240)"/>
      <line y1="-144" y2="-130" transform="rotate(300)"/>
      <line y1="-144" y2="-130" transform="rotate(330)"/>
    </g>
  </g>

  <!-- 指针 -->
  <g transform="translate(512,600)" stroke="#4a1a16" stroke-linecap="round">
    <line x1="0" y1="0" x2="78" y2="-54" stroke-width="16"/>
    <line x1="0" y1="0" x2="-24" y2="-66" stroke-width="18"/>
  </g>
  <circle cx="512" cy="600" r="20" fill="#e03a3e"/>
  <circle cx="512" cy="600" r="9" fill="#4a1a16"/>
</svg>
